name: Build Tweak

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Set THEOS path TRƯỚC — install script đọc biến này
      - name: Set THEOS env
        run: echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      # Cache Theos
      - name: Cache Theos
        uses: actions/cache@v4
        id: theos-cache
        with:
          path: ~/theos
          key: theos-${{ runner.os }}-v3

      # Install Theos
      - name: Install Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          git clone --recursive https://github.com/theos/theos.git $HOME/theos

      # Install ldid (signing tool required by Theos)
      - name: Install ldid
        run: |
          brew install ldid || true
          # Fallback: download prebuilt binary if brew fails
          if ! command -v ldid &>/dev/null; then
            curl -L https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_macosx_x86_64 -o /usr/local/bin/ldid
            chmod +x /usr/local/bin/ldid
          fi
          ldid -v || echo "ldid installed"

      # Cache iOS SDK
      - name: Cache iOS SDK
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: ~/theos/sdks/iPhoneOS16.5.sdk
          key: sdk-iPhoneOS16.5-v1

      # Download SDK
      - name: Download iOS SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p $HOME/theos/sdks
          curl -L -o /tmp/sdk.tar.xz \
            https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz
          tar -xf /tmp/sdk.tar.xz -C $HOME/theos/sdks

      # Verify
      - name: Verify tools
        run: |
          echo "THEOS=$THEOS"
          ls $THEOS/makefiles/common.mk
          which ldid && ldid -v || true

      # Build
      - name: Build .deb
        run: |
          make clean
          make package FINALPACKAGE=1 FOR_RELEASE=1

      # Upload artifact
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: tweak-deb-${{ github.run_number }}
          path: packages/*.deb
          retention-days: 30

      # Auto release on tag
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
